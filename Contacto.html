<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Super Pura - Contacto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s, color 0.3s;
        }
        body.claro {
            background-color: #ffffff;
            color: #333333;
        }

        body.oscuro {
            background-color: #1a1a1a;
            color: #e0e0e0;
        }
        header {
            background-color: #c62828;
            color: #ffffff;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #f5c542;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: #000000;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        nav a:hover {
            color: #c62828;
        }

        footer {
            background-color: #c62828;
            color: #ffffff;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }

        main {
            padding: 20px;
        }

        section {
            background-color: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        body.oscuro section {
            background-color: #2a2a2a;
        }
        form div {
            margin-bottom: 12px;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #f5c542;
            border: none;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .btn-tema {
            margin-top: 10px;
            padding: 8px 12px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            background-color: #f5c542;
        }
        iframe {
            width: 100%;
            height: 300px;
            border: 0;
            border-radius: 8px;
        }
        .logo-header {
        max-width: 90px;
        width: 100%;
        height: auto;
        display: block;
        margin: 10px auto;
        }
    </style>
</head>

<body class="claro">
    <img src="img/logo-superpura.jpg" alt="Logo Super Pura" class="logo-header">
    <header>
        <h1>Contacto Super Pura</h1>
        <p>Comunícate con nosotros</p>

        <button class="btn-tema" onclick="cambiarTema()">
            Cambiar fondo
        </button>
    </header>
    <nav>
        <a href="Index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="Contacto.html">Contacto</a>
    </nav>
    <main>
        <section>
            <h2>Información de contacto</h2>
            <p><strong>Correo:</strong> contacto@superpura.com</p>
            <p><strong>Teléfono:</strong> 300 123 4567</p>
            <p><strong>Dirección:</strong> Plaza de Bolívar, Tunja - Boyacá</p>
        </section>
        <section>
            <h2>Formulario de contacto</h2>

            <form>
                <div>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre">
                </div>

                <div>
                    <label for="correo">Correo:</label>
                    <input type="email" id="correo" name="correo">
                </div>

                <div>
                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>

                <div>
                    <label for="asunto">Asunto:</label>
                    <input type="text" id="asunto" name="asunto">

                <div>
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4"></textarea>
                </div>

                <button type="submit">Enviar</button>
            </form>
        </section>
        <section>
            <h2>Ubicación</h2>

            <iframe
                src="https://www.google.com/maps?q=Plaza+de+Bolivar+Tunja+Boyaca&output=embed"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

    </main>
    <footer>
        <p>© 2026 Super Pura</p>
    </footer>
    <script>
        function cambiarTema() {
            document.body.classList.toggle("oscuro");
            document.body.classList.toggle("claro");
        }
    </script>

</body>

</html>
